<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
    
    <!-- Top Amber Glow -->
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base Dark Background -->
  <rect width="100%" height="100%" fill="#1a1a1a"/>

  <!-- Apply Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Apply Glow -->
  <rect width="100%" height="100%" fill="url(#glow)" />
</svg>
